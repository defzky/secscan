# openlabs.my.id — HTTP redirect → HTTPS
server {
    listen 80;
    server_name openlabs.my.id;
    return 301 https://$host$request_uri;
}

# openlabs.my.id — HTTPS (static landing page + secscan subpath)
server {
    listen 443 ssl;
    server_name openlabs.my.id;

    ssl_certificate     /etc/letsencrypt/live/openlabs.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openlabs.my.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/openlabs.my.id;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # === secscan API via subpath ===

    # POST /sec/api/scan → POST /scan on API port
    location /sec/api/scan {
        limit_except POST { deny all; }
        proxy_pass http://127.0.0.1:9090/scan;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # GET /sec/api/report/latest → GET /report/latest
    location /sec/api/report/ {
        proxy_pass http://127.0.0.1:9090/report/;
        proxy_set_header Host $host;
    }

    # GET /sec/api/reports → GET /reports
    location /sec/api/reports {
        proxy_pass http://127.0.0.1:9090/reports;
        proxy_set_header Host $host;
    }

    # GET /sec/api/health → GET /health
    location /sec/api/health {
        proxy_pass http://127.0.0.1:9090/health;
        proxy_set_header Host $host;
    }

    # === secscan dashboard (catch-all) ===
    location /sec/ {
        proxy_pass http://127.0.0.1:9091/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
